<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d5a80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c4160;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)" />
  <!-- Letter A — elegant, centered, DM Serif-style proportions -->
  <text
    x="50"
    y="70"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="400"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-1"
  >A</text>
  <!-- Subtle accent underline -->
  <rect x="32" y="78" width="36" height="2.5" rx="1.25" fill="rgba(255,255,255,0.35)" />
</svg>
